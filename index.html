<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voldy Player</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: pointer;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #player-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
      pointer-events: none;
    }

    #tap-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
      cursor: pointer;
      background: transparent;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      z-index: 30;
      font-size: 18px;
    }

    #message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: #000;
      color: #fff;
      z-index: 40;
      font-size: 18px;
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 25;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    #hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loader">Chargement…</div>
    <div id="message"></div>

    <div id="player-container">
      <iframe
        id="player"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

    <div id="tap-layer" aria-label="Suivant"></div>
    <div id="hint">Tap / clic n’importe où pour suivant</div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWb6tylWpk9MZSp4sppFMgMPsVJBp3xyV5aJxLciYDcS2U5XiljbZlAg8muJzc3f6J4-bVfqYJf-a4/pub?gid=0&single=true&output=csv";

    let videos = [];
    let currentIndex = 0;
    let userInteracted = false;

    const player = document.getElementById("player");
    const tapLayer = document.getElementById("tap-layer");
    const loader = document.getElementById("loader");
    const message = document.getElementById("message");
    const hint = document.getElementById("hint");

    function showMessage(text) {
      message.textContent = text;
      message.style.display = "flex";
    }

    function hideLoader() {
      loader.style.display = "none";
    }

    function hideHint() {
      hint.classList.add("hidden");
    }

    function extractYouTubeId(url) {
      try {
        const parsed = new URL(url);

        if (parsed.hostname.includes("youtu.be")) {
          return parsed.pathname.split("/").filter(Boolean)[0] || null;
        }

        if (parsed.hostname.includes("youtube.com")) {
          const v = parsed.searchParams.get("v");
          if (v) return v;

          const parts = parsed.pathname.split("/").filter(Boolean);
          const shortsIndex = parts.indexOf("shorts");
          if (shortsIndex !== -1 && parts[shortsIndex + 1]) {
            return parts[shortsIndex + 1];
          }
        }

        return null;
      } catch {
        return null;
      }
    }

    function buildEmbedUrl(videoId, withSound = false) {
      const params = new URLSearchParams({
        autoplay: "1",
        mute: withSound ? "0" : "1",
        controls: "0",
        rel: "0",
        modestbranding: "1",
        playsinline: "1",
        iv_load_policy: "3",
        fs: "0",
        disablekb: "1",
        color: "white"
      });

      return `https://www.youtube-nocookie.com/embed/${videoId}?${params.toString()}`;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function csvToObjects(csvText) {
      const lines = csvText
        .split(/\r?\n/)
        .filter(line => line.trim().length > 0);

      if (lines.length < 2) return [];

      const headers = parseCSVLine(lines[0]).map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const obj = {};

        headers.forEach((header, index) => {
          obj[header] = (values[index] || "").trim();
        });

        return obj;
      });
    }

    function getYoutubeUrlFromRow(row) {
      return row.youtube_url || row.url || row.video_url || row.link || "";
    }

    function normalizeVideos(rows) {
      return rows
        .map((row) => {
          const youtubeUrl = getYoutubeUrlFromRow(row);
          const videoId = extractYouTubeId(youtubeUrl);

          if (!youtubeUrl || !videoId) return null;

          return {
            videoId,
            youtubeUrl
          };
        })
        .filter(Boolean);
    }

    async function fetchSheetVideos() {
      const response = await fetch(SHEET_CSV_URL);

      if (!response.ok) {
        throw new Error(`Erreur Google Sheets: ${response.status}`);
      }

      const csvText = await response.text();
      const rows = csvToObjects(csvText);
      return normalizeVideos(rows);
    }

    function loadVideo(index) {
      if (!videos.length) return;

      currentIndex = ((index % videos.length) + videos.length) % videos.length;
      const current = videos[currentIndex];

      player.src = buildEmbedUrl(current.videoId, userInteracted);
    }

    function nextVideo() {
      loadVideo(currentIndex + 1);
    }

    function enableSound() {
      if (userInteracted) return;
      userInteracted = true;
    }

    async function init() {
      try {
        videos = await fetchSheetVideos();

        if (!videos.length) {
          hideLoader();
          showMessage("Aucune vidéo trouvée dans Google Sheets.");
          return;
        }

        loadVideo(0);
        hideLoader();
      } catch (error) {
        console.error(error);
        hideLoader();
        showMessage("Impossible de charger Google Sheets : " + error.message);
      }
    }

    tapLayer.addEventListener("click", () => {
      hideHint();
      enableSound();
      nextVideo();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " " || e.key.toLowerCase() === "n") {
        e.preventDefault();
        hideHint();
        enableSound();
        nextVideo();
      }
    });

    init();
  </script>
</body>
</html>
