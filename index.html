<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Simp</title>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  cursor: pointer;
  font-family: Arial, Helvetica, sans-serif;
}

#app { position: fixed; inset: 0; background: #000; overflow: hidden; }

#player-container { position: absolute; inset: 0; }
#player-frame {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
#player { width: 100%; height: 100%; border: 0; pointer-events: none; }

#tap-layer { position: absolute; inset: 0; z-index: 20; }

#loader {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; z-index: 30;
}

#hint {
  position: absolute;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  z-index: 25;
}

#logo {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 50px;
  z-index: 50;
  cursor: pointer;
}

/* FULLSCREEN BTN */
#fullscreen-btn {
  position: absolute;
  right: 12px;
  bottom: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  cursor: pointer;
}

#fullscreen-btn svg {
  width: 18px;
  height: 18px;
  color: white;
}

/* MANIFESTO */
#manifesto-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#manifesto-overlay.visible {
  display: flex;
}

#manifesto-text {
  color: white;
  font-size: clamp(22px, 5vw, 40px);
  text-align: center;
  white-space: pre-line;
}
</style>
</head>

<body>
<div id="app">

<div id="loader">Chargement…</div>

<div id="player-container">
  <div id="player-frame">
    <iframe id="player" allow="autoplay"></iframe>
  </div>
</div>

<div id="tap-layer"></div>
<div id="hint">Tap anywhere</div>

<div id="fullscreen-btn">
  ⛶
</div>

<img id="logo" src="/simp.png" />

<div id="manifesto-overlay">
  <div id="manifesto-text"></div>
</div>

</div>

<script>
const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWb6tylWpk9MZSp4sppFMgMPsVJBp3xyV5aJxLciYDcS2U5XiljbZlAg8muJzc3f6J4-bVfqYJf-a4/pub?output=csv";

let videos = [];
let currentIndex = 0;
let watchStart = 0;

const profile = { category:{}, mood:{}, energy:{} };

const recent = [];

const player = document.getElementById("player");
const tap = document.getElementById("tap-layer");
const logo = document.getElementById("logo");
const manifesto = document.getElementById("manifesto-overlay");
const textEl = document.getElementById("manifesto-text");
const fullscreenBtn = document.getElementById("fullscreen-btn");
const app = document.getElementById("app");

/* ---------- HELPERS ---------- */

function id(url){
  try{
    const u = new URL(url);
    return u.searchParams.get("v") || u.pathname.split("/").pop();
  }catch{return null}
}

function embed(id){
  return `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=0&controls=0`;
}

function bump(obj,key,val){
  if(!key)return;
  obj[key]=(obj[key]||0)+val;
}

/* ---------- DATA ---------- */

async function load(){
  const txt = await fetch(SHEET).then(r=>r.text());
  const rows = txt.split("\n").slice(1);

  videos = rows.map(r=>{
    const [url,category,mood,energy] = r.split(",");
    return { id:id(url), category, mood, energy };
  }).filter(v=>v.id);

  next(true);
}

/* ---------- ALGO ---------- */

function feedback(video, t){
  if(t<5){
    bump(profile.category,video.category,-3);
    bump(profile.mood,video.mood,-3);
    bump(profile.energy,video.energy,-2);
  }else if(t<20){
    bump(profile.category,video.category,-1);
  }else{
    bump(profile.category,video.category,2);
    bump(profile.mood,video.mood,2);
  }
}

function score(v){
  let s=0;
  s+=(profile.category[v.category]||0)*3;
  s+=(profile.mood[v.mood]||0)*3;
  s+=(profile.energy[v.energy]||0)*2;

  if(recent.includes(v.id)) s-=50;

  return s + Math.random()*2;
}

function pick(){
  return videos
    .map((v,i)=>({i,s:score(v)}))
    .sort((a,b)=>b.s-a.s)[0].i;
}

/* ---------- PLAYER ---------- */

function play(i){
  currentIndex=i;
  player.src = embed(videos[i].id);
  watchStart = Date.now();
  recent.push(videos[i].id);
}

function next(init=false){
  if(!init){
    const t = (Date.now()-watchStart)/1000;
    feedback(videos[currentIndex], t);
  }
  play(pick());
}

/* ---------- UX ---------- */

tap.onclick = ()=>next();

logo.onclick = (e)=>{
  e.stopPropagation();
  manifesto.classList.toggle("visible");
  typeText();
};

function typeText(){
  const text = `No account.
No password.
No ads.
No cookies.
No tracking.
No data collection.
Just music, video, and privacy.`;

  textEl.innerHTML="";
  let i=0;
  function t(){
    textEl.innerHTML=text.slice(0,i++);
    if(i<text.length) setTimeout(t,20);
  }
  t();
}

/* ---------- FULLSCREEN ---------- */

fullscreenBtn.onclick = ()=>{
  if(!document.fullscreenElement){
    app.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
};

document.addEventListener("keydown",(e)=>{
  if(e.key==="f") app.requestFullscreen();
});

/* ---------- INIT ---------- */

load();
</script>
</body>
</html>
