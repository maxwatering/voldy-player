<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Simp</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: pointer;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    #player-container {
      position: absolute;
      inset: 0;
    }

    #player-frame {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: 100vh;
    }

    #player {
      width: 100%;
      height: 100%;
      border: 0;
      pointer-events: none;
    }

    #tap-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      z-index: 30;
    }

    #message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 40;
      text-align: center;
      padding: 24px;
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      z-index: 25;
      transition: opacity 0.3s;
    }

    #hint.hidden {
      opacity: 0;
    }

    /* LOGO */
    #logo {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: 50px;
      opacity: 0.55;
      z-index: 25;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #logo.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loader">Chargement…</div>
    <div id="message"></div>

    <div id="player-container">
      <div id="player-frame">
        <iframe id="player" allow="autoplay"></iframe>
      </div>
    </div>

    <div id="tap-layer"></div>
    <div id="hint">Tap n’importe où</div>

    <!-- LOGO -->
    <img id="logo" src="/simp.png" alt="Simp" />
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWb6tylWpk9MZSp4sppFMgMPsVJBp3xyV5aJxLciYDcS2U5XiljbZlAg8muJzc3f6J4-bVfqYJf-a4/pub?gid=0&single=true&output=csv";

    let videos = [];
    let currentIndex = 0;
    let userInteracted = false;

    const player = document.getElementById("player");
    const tapLayer = document.getElementById("tap-layer");
    const loader = document.getElementById("loader");
    const message = document.getElementById("message");
    const hint = document.getElementById("hint");
    const logo = document.getElementById("logo");

    function extractYouTubeId(url) {
      try {
        const parsed = new URL(url);
        return parsed.searchParams.get("v");
      } catch {
        return null;
      }
    }

    function buildEmbedUrl(videoId, sound = false) {
      return `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&mute=${sound ? 0 : 1}&controls=0&modestbranding=1`;
    }

    async function fetchVideos() {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();

      const lines = text.split("\n").slice(1);

      return lines.map(line => {
        const url = line.split(",")[0];
        const id = extractYouTubeId(url);
        if (!id) return null;
        return { id };
      }).filter(Boolean);
    }

    function loadVideo(index) {
      if (!videos.length) return;
      currentIndex = index % videos.length;
      player.src = buildEmbedUrl(videos[currentIndex].id, userInteracted);
    }

    function nextVideo() {
      loadVideo(currentIndex + 1);
    }

    function handleTap() {
      hint.classList.add("hidden");
      logo.classList.add("hidden");
      userInteracted = true;
      nextVideo();
    }

    async function init() {
      try {
        videos = await fetchVideos();
        if (!videos.length) throw new Error();
        loadVideo(0);
        loader.style.display = "none";
      } catch {
        loader.style.display = "none";
        message.style.display = "flex";
        message.textContent = "Erreur chargement vidéos";
      }
    }

    tapLayer.addEventListener("click", handleTap);

    init();
  </script>
</body>
</html>
