<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Simp</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    #start-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #000;
    }

    #start-overlay.hidden {
      display: none;
    }

    #start-logo {
      width: 90px;
      opacity: 0.92;
    }

    #start-btn {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    }

    #start-btn:hover {
      transform: scale(1.03);
      background: rgba(255,255,255,0.14);
    }

    #start-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    #start-status {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    #player-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #player-frame {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
      pointer-events: none;
    }

    #tap-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
    }

    #loader {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #000;
      z-index: 30;
      font-size: 18px;
    }

    #message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #fff;
      background: rgba(0, 0, 0, 0.9);
      z-index: 40;
      font-size: 18px;
      line-height: 1.4;
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      z-index: 25;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      padding: 0 16px;
    }

    #hint.hidden {
      opacity: 0;
    }

    #logo {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: 50px;
      z-index: 50;
      cursor: pointer;
      opacity: 0.78;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #logo:hover {
      opacity: 1;
      transform: translateX(-50%) scale(1.04);
    }

    #fullscreen-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      cursor: pointer;
      color: #fff;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    #fullscreen-btn:hover {
      transform: scale(1.05);
      background: rgba(0,0,0,0.58);
    }

    #fullscreen-btn svg {
      width: 18px;
      height: 18px;
    }

    #manifesto-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(0,0,0,0);
      padding: 32px;
      cursor: pointer;
    }

    #manifesto-overlay.visible {
      display: flex;
    }

    #manifesto-text {
      color: #fff;
      font-size: clamp(22px, 5vw, 40px);
      text-align: center;
      white-space: pre-line;
      line-height: 1.45;
      text-shadow: 0 0 18px rgba(0,0,0,0.45);
      max-width: 900px;
    }

    #manifesto-caret {
      display: inline-block;
      width: 0.08em;
      background: #fff;
      margin-left: 0.08em;
      animation: blink 0.9s steps(1) infinite;
      vertical-align: baseline;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 768px) {
      #logo {
        width: 46px;
        bottom: 6px;
      }

      #hint {
        font-size: 11px;
        bottom: 24px;
      }

      #fullscreen-btn {
        right: 10px;
        bottom: 10px;
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="start-overlay">
      <img id="start-logo" src="/simp.png" alt="Simp" />
      <button id="start-btn" disabled>Loading…</button>
      <div id="start-status">Preparing your session</div>
    </div>

    <div id="loader">Chargement…</div>
    <div id="message"></div>

    <div id="player-container">
      <div id="player-frame">
        <iframe
          id="player"
          allow="autoplay; encrypted-media; picture-in-picture; accelerometer; gyroscope"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </div>
    </div>

    <div id="tap-layer" aria-label="Suivant"></div>
    <div id="hint">Tap / clic n’importe où = suivant · Secoue = suivant · F = fullscreen</div>

    <div id="fullscreen-btn" aria-label="Fullscreen" title="Fullscreen">
      <svg id="fullscreen-icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="8 3 3 3 3 8"></polyline>
        <line x1="3" y1="3" x2="9" y2="9"></line>
        <polyline points="16 3 21 3 21 8"></polyline>
        <line x1="21" y1="3" x2="15" y2="9"></line>
        <polyline points="8 21 3 21 3 16"></polyline>
        <line x1="3" y1="21" x2="9" y2="15"></line>
        <polyline points="16 21 21 21 21 16"></polyline>
        <line x1="21" y1="21" x2="15" y2="15"></line>
      </svg>

      <svg id="fullscreen-icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <polyline points="9 3 9 9 3 9"></polyline>
        <line x1="9" y1="9" x2="3" y2="3"></line>
        <polyline points="15 3 15 9 21 9"></polyline>
        <line x1="15" y1="9" x2="21" y2="3"></line>
        <polyline points="9 21 9 15 3 15"></polyline>
        <line x1="9" y1="15" x2="3" y2="21"></line>
        <polyline points="15 21 15 15 21 15"></polyline>
        <line x1="15" y1="15" x2="21" y2="21"></line>
      </svg>
    </div>

    <img id="logo" src="/simp.png" alt="Simp" />

    <div id="manifesto-overlay">
      <div id="manifesto-text"></div>
    </div>
  </div>

  <script>
    const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWb6tylWpk9MZSp4sppFMgMPsVJBp3xyV5aJxLciYDcS2U5XiljbZlAg8muJzc3f6J4-bVfqYJf-a4/pub?output=csv";

    const MANIFESTO_TEXT =
`No account.
No password.
No ads.
No cookies.
No tracking.
No data collection.
Just music, video, and privacy.`;

    let videos = [];
    let currentIndex = 0;
    let watchStart = 0;
    let userStarted = false;
    let userInteracted = false;
    let lastSkip = 0;
    let lastShake = 0;
    let motionEnabled = false;
    let typingTimeout = null;
    let manifestoOpen = false;

    const profile = { category:{}, mood:{}, energy:{} };
    const recent = [];

    const app = document.getElementById("app");
    const player = document.getElementById("player");
    const tap = document.getElementById("tap-layer");
    const logo = document.getElementById("logo");
    const manifesto = document.getElementById("manifesto-overlay");
    const textEl = document.getElementById("manifesto-text");
    const fullscreenBtn = document.getElementById("fullscreen-btn");
    const startOverlay = document.getElementById("start-overlay");
    const startBtn = document.getElementById("start-btn");
    const startStatus = document.getElementById("start-status");
    const loader = document.getElementById("loader");
    const message = document.getElementById("message");
    const hint = document.getElementById("hint");
    const enterIcon = document.getElementById("fullscreen-icon-enter");
    const exitIcon = document.getElementById("fullscreen-icon-exit");

    function showMessage(text) {
      message.textContent = text;
      message.style.display = "flex";
    }

    function hideHint() {
      hint.classList.add("hidden");
    }

    function idFromUrl(url){
      try{
        const u = new URL(url);
        return u.searchParams.get("v") || u.pathname.split("/").filter(Boolean).pop();
      } catch {
        return null;
      }
    }

    function embed(id){
      return `https://www.youtube.com/embed/${id}?autoplay=1&mute=${userInteracted ? 0 : 1}&controls=0&modestbranding=1&rel=0&playsinline=1&iv_load_policy=3&fs=0&disablekb=1`;
    }

    function bump(obj,key,val){
      if(!key) return;
      obj[key] = (obj[key] || 0) + val;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function csvToObjects(csvText) {
      const lines = csvText
        .split(/\r?\n/)
        .filter(line => line.trim().length > 0);

      if (lines.length < 2) return [];

      const headers = parseCSVLine(lines[0]).map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const obj = {};

        headers.forEach((header, index) => {
          obj[header] = (values[index] || "").trim();
        });

        return obj;
      });
    }

    function normalizeValue(v) {
      return (v || "").trim().toLowerCase();
    }

    async function loadVideos(){
      const txt = await fetch(SHEET).then(r => {
        if (!r.ok) throw new Error(`Google Sheet error ${r.status}`);
        return r.text();
      });

      const rows = csvToObjects(txt);

      videos = rows.map((row, index) => {
        const url = row.youtube_url || row.url || row.video_url || row.link || "";
        return {
          id: idFromUrl(url),
          category: normalizeValue(row.category),
          mood: normalizeValue(row.mood),
          energy: normalizeValue(row.energy),
          raw: row,
          index
        };
      }).filter(v => v.id);

      if (!videos.length) {
        throw new Error("No valid videos found");
      }
    }

    function feedback(video, t){
      if(!video) return;

      if(t < 5){
        bump(profile.category, video.category, -3);
        bump(profile.mood, video.mood, -3);
        bump(profile.energy, video.energy, -2);
      } else if (t < 15) {
        bump(profile.category, video.category, -2);
        bump(profile.mood, video.mood, -2);
        bump(profile.energy, video.energy, -1);
      } else if (t < 45) {
        bump(profile.category, video.category, 1);
        bump(profile.mood, video.mood, 1);
        bump(profile.energy, video.energy, 1);
      } else {
        bump(profile.category, video.category, 2);
        bump(profile.mood, video.mood, 2);
        bump(profile.energy, video.energy, 1);
      }
    }

    function score(v){
      let s = 0;
      s += (profile.category[v.category] || 0) * 3;
      s += (profile.mood[v.mood] || 0) * 3;
      s += (profile.energy[v.energy] || 0) * 2;
      if(recent.includes(v.id)) s -= 50;
      if(videos[currentIndex] && v.id === videos[currentIndex].id) s -= 999;
      return s + Math.random() * 2;
    }

    function pick(){
      if (videos.length === 1) return 0;

      const ranked = videos
        .map((v,i)=>({i,s:score(v)}))
        .sort((a,b)=>b.s-a.s);

      const top = ranked.slice(0, Math.min(3, ranked.length));
      return top[Math.floor(Math.random() * top.length)].i;
    }

    function play(i){
      currentIndex = i;
      const video = videos[i];
      player.src = embed(video.id);
      watchStart = Date.now();
      recent.push(video.id);
      if (recent.length > 12) recent.shift();
    }

    function next(){
      const now = Date.now();
      if(now - lastSkip < 800) return;
      lastSkip = now;

      const current = videos[currentIndex];
      const t = (Date.now() - watchStart) / 1000;
      feedback(current, t);

      const nextIndex = pick();
      setTimeout(() => {
        play(nextIndex);
      }, 250);
    }

    async function enableMotionIfPossible() {
      if (motionEnabled) return;
      if (!("DeviceMotionEvent" in window)) return;

      try {
        if (typeof DeviceMotionEvent.requestPermission === "function") {
          const permission = await DeviceMotionEvent.requestPermission();
          if (permission !== "granted") return;
        }

        window.addEventListener("devicemotion", (e) => {
          if (!userStarted || manifestoOpen) return;
          const acc = e.accelerationIncludingGravity || e.acceleration;
          if (!acc) return;

          const total = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
          const now = Date.now();

          if(total > 40 && now - lastShake > 1200){
            lastShake = now;
            next();
          }
        }, { passive: true });

        motionEnabled = true;
      } catch {}
    }

    function updateFullscreenIcon() {
      const active = !!document.fullscreenElement;
      enterIcon.style.display = active ? "none" : "block";
      exitIcon.style.display = active ? "block" : "none";
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await app.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch {}
    }

    function typeText(){
      const text = MANIFESTO_TEXT;
      textEl.innerHTML = "";
      let i = 0;

      if (typingTimeout) clearTimeout(typingTimeout);

      function t(){
        textEl.innerHTML = text.slice(0, i++) + '<span id="manifesto-caret"></span>';
        if(i <= text.length) {
          typingTimeout = setTimeout(t, 20);
        } else {
          textEl.innerHTML = text;
        }
      }
      t();
    }

    async function boot() {
      try {
        await loadVideos();
        startBtn.disabled = false;
        startBtn.textContent = "Click to start";
        startStatus.textContent = `${videos.length} videos ready`;
      } catch (err) {
        startBtn.disabled = true;
        startBtn.textContent = "Unavailable";
        startStatus.textContent = "Impossible to load the session";
        console.error(err);
      }
    }

    startBtn.onclick = async () => {
      if (!videos.length) return;

      userStarted = true;
      userInteracted = true;
      startOverlay.classList.add("hidden");
      hideHint();

      play(Math.floor(Math.random() * videos.length));
      enableMotionIfPossible();
    };

    tap.onclick = ()=>{
      if(!userStarted || manifestoOpen) return;
      next();
    };

    logo.onclick = (e)=>{
      e.stopPropagation();
      manifestoOpen = !manifestoOpen;
      manifesto.classList.toggle("visible");
      if (manifestoOpen) {
        typeText();
      } else {
        textEl.innerHTML = "";
        if (typingTimeout) clearTimeout(typingTimeout);
      }
    };

    manifesto.onclick = (e) => {
      e.stopPropagation();
      manifestoOpen = false;
      manifesto.classList.remove("visible");
      textEl.innerHTML = "";
      if (typingTimeout) clearTimeout(typingTimeout);
    };

    fullscreenBtn.onclick = (e)=>{
      e.stopPropagation();
      toggleFullscreen();
    };

    document.addEventListener("fullscreenchange", updateFullscreenIcon);

    document.addEventListener("keydown",(e)=>{
      if(e.key === "Escape" && manifestoOpen){
        manifestoOpen = false;
        manifesto.classList.remove("visible");
        textEl.innerHTML = "";
        return;
      }

      if(e.key.toLowerCase() === "f") {
        e.preventDefault();
        toggleFullscreen();
        return;
      }

      if((e.key === " " || e.key === "ArrowRight" || e.key.toLowerCase() === "n") && userStarted && !manifestoOpen){
        e.preventDefault();
        next();
      }
    });

    boot();
  </script>
</body>
</html>
