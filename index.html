<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Simp - AI Music Stream</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: pointer; font-family: 'Courier New', Courier, monospace; }
    #app { position: fixed; inset: 0; background: #000; overflow: hidden; }

    /* OVERLAY ACCÈS WONDERLAND */
    #start-overlay {
      position: absolute; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 40px; background: #000; transition: opacity 1s ease;
    }
    #start-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #start-logo { width: 70px; opacity: 0.6; filter: grayscale(1); }
    .input-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #access-hint { color: #555; font-size: 14px; letter-spacing: 0.1em; text-align: center; }
    #access-input {
      background: transparent; border: none; border-bottom: 1px solid #222;
      color: #fff; text-align: center; font-size: 42px; letter-spacing: 0.2em;
      width: 220px; outline: none; padding: 10px; transition: all 0.3s;
    }
    #access-input:focus { border-bottom-color: #444; }
    .button-group {
      display: flex; gap: 20px; opacity: 0; transform: translateY(15px);
      transition: all 0.6s ease; pointer-events: none;
    }
    .button-group.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .choice-btn {
      padding: 12px 35px; border-radius: 2px; font-weight: bold;
      font-size: 12px; cursor: pointer; text-transform: uppercase;
      border: none; letter-spacing: 0.2em; transition: transform 0.2s;
    }
    .btn-red { background: #ff0033; color: #fff; box-shadow: 0 0 15px rgba(255, 0, 51, 0.2); }
    .btn-blue { background: #0066ff; color: #fff; box-shadow: 0 0 15px rgba(0, 102, 255, 0.2); }

    /* PLAYER CONTAINER - FULL VERTICAL MOBILE */
    #player-container { position: absolute; inset: 0; background: #000; overflow: hidden; }
    #player-frame { 
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
      width: 100vw; height: 56.25vw; transition: opacity 0.8s ease;
    }
    @media (orientation: portrait) {
      #player-frame { height: 100dvh; width: 177.78dvh; }
    }
    @media (orientation: landscape) and (min-aspect-ratio: 16/9) {
      #player-frame { width: 100vw; height: 56.25vw; }
    }

    #player { width: 100%; height: 100%; border: 0; pointer-events: none; }
    #tap-layer { position: absolute; inset: 0; z-index: 20; cursor: pointer; }
    #logo { position: absolute; left: 50%; bottom: 15px; transform: translateX(-50%); width: 40px; z-index: 50; opacity: 0.3; transition: opacity 0.3s; cursor: pointer; }

    #fullscreen-btn {
      position: absolute; right: 20px; bottom: 20px; width: 40px; height: 40px;
      border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center; z-index: 60;
      color: rgba(255,255,255,0.4); cursor: pointer;
    }

    /* MANIFESTO PIXEL ART */
    #manifesto-overlay {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      z-index: 100; background: rgba(0,0,0,0.98); padding: 40px; cursor: pointer;
    }
    #manifesto-overlay.visible { display: flex; }
    #manifesto-text { 
      color: #fff; font-family: 'Press Start 2P', cursive; font-size: clamp(10px, 2.2vw, 16px); 
      text-align: center; white-space: pre-line; line-height: 2; max-width: 900px; 
    }
    #manifesto-caret { display: inline-block; width: 0.2em; background: #fff; margin-left: 5px; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes breathe { 0%, 100% { background: rgba(255,255,255,0); } 50% { background: rgba(255,255,255,0.018); } }
    #tap-layer.alive { animation: breathe var(--breath-rate, 8s) ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="app">
    <div id="start-overlay">
      <img id="start-logo" src="/simp.png" />
      <div class="input-wrapper">
        <div id="access-hint">What time is it in Wonderland?</div>
        <input type="tel" id="access-input" placeholder="0000" maxlength="4" autocomplete="off" autofocus>
        <div class="button-group" id="btn-group">
          <button class="choice-btn btn-red" id="btn-yalp">yalp</button>
          <button class="choice-btn btn-blue" id="btn-play">play</button>
        </div>
      </div>
    </div>

    <div id="player-container">
      <div id="player-frame"><div id="player"></div></div>
    </div>

    <div id="tap-layer"></div>
    <img id="logo" src="/simp.png" />

    <div id="fullscreen-btn">
      <svg id="fullscreen-icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
      <svg id="fullscreen-icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px; display:none;"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
    </div>

    <div id="manifesto-overlay"><div id="manifesto-text"></div></div>
  </div>

  <script>
    const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWb6tylWpk9MZSp4sppFMgMPsVJBp3xyV5aJxLciYDcS2U5XiljbZlAg8muJzc3f6J4-bVfqYJf-a4/pub?output=csv";
    const MANIFESTO_TEXT = `No account.\nNo password.\nNo ads.\nNo cookies.\nNo tracking.\nNo data collection.\n\nJust music, video, and privacy. ♥️`;

    let videos = [];
    let currentIndex = 0;
    let watchStart = 0;
    let userStarted = false;
    let ytPlayer = null;
    let skipStreak = 0;
    let lastShake = 0;
    let positiveListens = 0;
    let manifestoOpen = false;
    let typingTimeout = null;
    const profile = { category:{}, mood:{}, energy:{} };
    const recent = [];

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = () => { console.log("%c [SYSTEM] Engine Online.", "color: #555; font-weight: bold;"); };

    function createPlayer(videoId) {
      if (ytPlayer && ytPlayer.loadVideoById) {
        ytPlayer.loadVideoById(videoId);
      } else {
        ytPlayer = new YT.Player('player', {
          videoId: videoId,
          playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1, 'enablejsapi': 1 },
          events: { 
            'onReady': (e) => e.target.playVideo(),
            'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) next(); }
          }
        });
      }
    }

    const accessInput = document.getElementById('access-input');
    const btnGroup = document.getElementById('btn-group');

    accessInput.addEventListener('input', () => {
      const now = new Date();
      const timeCode = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
      if (accessInput.value === timeCode) {
        btnGroup.classList.add('visible');
        accessInput.blur();
      }
    });

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      const sep = line.includes(';') ? ';' : ',';
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === sep && !inQuotes) { result.push(current); current = ""; }
        else current += char;
      }
      result.push(current);
      return result;
    }

    async function loadVideos(){
      try {
        const txt = await fetch(SHEET).then(r => r.text());
        const lines = txt.split(/\r?\n/).filter(l => l.trim());
        const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
        videos = lines.slice(1).map(line => {
          const values = parseCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => obj[h] = (values[i] || "").trim());
          const url = obj.youtube_url || obj.url || obj.video_url || obj.link || "";
          let id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop();
          return { id: id, category: (obj.category || "").toLowerCase(), mood: (obj.mood || "").toLowerCase(), energy: (obj.energy || "").toLowerCase(), length: parseInt(obj.video_length) || 180 };
        }).filter(v => v.id && v.id.length > 5);
      } catch (e) { console.error(e); }
    }

    // --- ALGORITHME DÉTAILLÉ ---
    function feedback(video, durationSeconds){
      if(!video) return;
      const progress = durationSeconds / video.length;
      let weight = 0;
      let reason = "";

      if (durationSeconds < 10 || progress < 0.15) {
        weight = -5; skipStreak++;
        reason = "Hard skip / Disinterest detected.";
      } else if (progress < 0.5) {
        weight = -1; skipStreak = 0;
        reason = "Partial play. Style not matching current vibe.";
      } else if (progress < 0.9) {
        weight = 3; skipStreak = 0;
        reason = "Engaged listener. Positive reinforcement applied.";
      } else {
        weight = 7; skipStreak = 0;
        reason = "Full track completion. Heavily weighting these tags.";
      }

      console.group(`🧠 ALGO: Feedback for ${video.id}`);
      console.log(`%c Result: ${weight > 0 ? 'REWARD' : 'PENALTY'} (${weight} pts)`, weight > 0 ? "color: #44ff44; font-weight: bold;" : "color: #ff4444; font-weight: bold;");
      console.log(`Watch time: ${Math.round(durationSeconds)}s / ${video.length}s (${Math.round(progress*100)}%)`);
      console.log(`Reason: ${reason}`);
      console.groupEnd();

      const bump = (obj, key, val) => { if(key && key !== "") obj[key] = (obj[key] || 0) + val; };
      bump(profile.category, video.category, weight);
      bump(profile.mood, video.mood, weight);
      bump(profile.energy, video.energy, weight);
      if (weight > 0) { positiveListens++; updateBreath(); }
    }

    function updateBreath() {
      if (positiveListens < 3) return;
      const top = Object.entries(profile.energy).sort((a,b) => b[1]-a[1])[0]?.[0] || "";
      const rate = /high|fast|energe|hype/i.test(top) ? 5 : /low|chill|ambient|slow/i.test(top) ? 13 : 8;
      const tl = document.getElementById('tap-layer');
      tl.style.setProperty('--breath-rate', rate + 's');
      tl.classList.add('alive');
    }

    function next(){
      if(!userStarted || videos.length === 0) return;
      feedback(videos[currentIndex], (Date.now() - watchStart)/1000);

      console.group("🔮 ALGO: Calculating Next Recommendation");
      
      // Top Affinities Log
      const getTop = (obj) => Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0,2).map(x => `${x[0]}(${x[1]})`).join(', ');
      console.log(`Current Affinities: [CAT: ${getTop(profile.category)}] [MOOD: ${getTop(profile.mood)}]`);

      const scored = videos.map((v, i) => {
        let catScore = (profile.category[v.category] || 0) * 3;
        let moodScore = (profile.mood[v.mood] || 0) * 3;
        let energyScore = (profile.energy[v.energy] || 0) * 2;
        let s = catScore + moodScore + energyScore;
        if(recent.includes(v.id)) s -= 500;
        return { i, s: s + Math.random() * 20, v };
      }).sort((a,b) => b.s - a.s);
      
      // Candidate Analysis
      console.log("Top 3 Candidates:");
      scored.slice(0, 3).forEach((c, idx) => {
          console.log(`${idx+1}. ID: ${c.v.id} | Score: ${Math.round(c.s)} | Match: ${c.v.category}/${c.v.mood}`);
      });

      currentIndex = scored[0].i;
      console.log(`%c Decision: Loading candidate #1 (Best compatibility)`, "color: #0066ff; font-weight: bold;");
      console.groupEnd();

      document.getElementById("player-frame").style.opacity = "0";
      setTimeout(() => { play(currentIndex); document.getElementById("player-frame").style.opacity = "1"; }, 400);
    }

    function play(idx){
      const video = videos[idx];
      createPlayer(video.id);
      watchStart = Date.now();
      recent.push(video.id);
      if(recent.length > 30) recent.shift();
      setTimeout(() => {
        if(ytPlayer && ytPlayer.setVolume) {
          const v = ytPlayer.getVolume();
          ytPlayer.setVolume(v > 0 ? v - 1 : 1);
          setTimeout(() => ytPlayer.setVolume(v), 50);
        }
      }, 2000);
    }

    function typeText(){
      const text = MANIFESTO_TEXT;
      const textEl = document.getElementById("manifesto-text");
      textEl.innerHTML = "";
      let i = 0;
      if (typingTimeout) clearTimeout(typingTimeout);
      function t(){
        textEl.innerHTML = text.slice(0, i++) + '<span id="manifesto-caret"></span>';
        if(i <= text.length) typingTimeout = setTimeout(t, 40);
        else textEl.innerHTML = text;
      }
      t();
    }

    async function requestMotionPermission() {
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const response = await DeviceMotionEvent.requestPermission();
          if (response === 'granted') window.addEventListener('devicemotion', handleMotion);
        } catch (e) { console.error(e); }
      } else { window.addEventListener('devicemotion', handleMotion); }
    }

    function handleMotion(event) {
      if (!userStarted || manifestoOpen) return;
      const acc = event.accelerationIncludingGravity;
      const delta = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
      const now = Date.now();
      if (delta > 35 && now - lastShake > 1500) { lastShake = now; next(); }
    }

    const startAction = () => {
      userStarted = true;
      document.getElementById('start-overlay').classList.add('hidden');
      requestMotionPermission();
      play(Math.floor(Math.random() * videos.length));
    };

    document.getElementById('btn-play').onclick = startAction;
    document.getElementById('btn-yalp').onclick = startAction;
    document.getElementById('tap-layer').onclick = () => { if(!manifestoOpen) next(); };
    document.getElementById('logo').onclick = (e) => {
      e.stopPropagation();
      manifestoOpen = !manifestoOpen;
      document.getElementById("manifesto-overlay").classList.toggle("visible");
      if(manifestoOpen) typeText();
    };
    document.getElementById('manifesto-overlay').onclick = () => {
      document.getElementById("manifesto-overlay").classList.remove("visible");
      manifestoOpen = false;
    };
    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.onclick = (e) => {
      e.stopPropagation();
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    };
    document.onfullscreenchange = () => {
      const isFS = !!document.fullscreenElement;
      document.getElementById("fullscreen-icon-enter").style.display = isFS ? "none" : "block";
      document.getElementById("fullscreen-icon-exit").style.display = isFS ? "block" : "none";
    };
    document.onkeydown = (e) => {
      if(e.key.toLowerCase() === "f") fsBtn.click();
      if((e.key === " " || e.key === "ArrowRight") && userStarted && !manifestoOpen) next();
    };
    loadVideos();
  </script>
</body>
</html>
