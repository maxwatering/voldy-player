<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Simp</title>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  cursor: pointer;
  font-family: Arial, Helvetica, sans-serif;
}

#app { position: fixed; inset: 0; background: #000; overflow: hidden; }

/* START SCREEN */
#start-overlay {
  position: absolute;
  inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: #000;
}

#start-overlay.hidden { display: none; }

#start-logo {
  width: 90px;
  opacity: 0.9;
}

#start-btn {
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: #fff;
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 14px;
  cursor: pointer;
  backdrop-filter: blur(8px);
}

/* PLAYER */
#player-container { position: absolute; inset: 0; }
#player-frame {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
#player {
  width: 100%;
  height: 100%;
  border: 0;
  pointer-events: none;
}

/* UI */
#tap-layer { position: absolute; inset: 0; z-index: 20; }

#loader {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  z-index: 30;
}

#hint {
  position: absolute;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  z-index: 25;
}

#logo {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 50px;
  z-index: 50;
  cursor: pointer;
}

/* FULLSCREEN */
#fullscreen-btn {
  position: absolute;
  right: 12px;
  bottom: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  cursor: pointer;
  color: white;
}

/* MANIFESTO */
#manifesto-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#manifesto-overlay.visible { display: flex; }

#manifesto-text {
  color: white;
  font-size: clamp(22px, 5vw, 40px);
  text-align: center;
  white-space: pre-line;
}
</style>
</head>

<body>
<div id="app">

<!-- START -->
<div id="start-overlay">
  <img id="start-logo" src="/simp.png" />
  <button id="start-btn">Click to start</button>
</div>

<div id="loader">Chargement…</div>

<div id="player-container">
  <div id="player-frame">
    <iframe id="player" allow="autoplay"></iframe>
  </div>
</div>

<div id="tap-layer"></div>
<div id="hint">Tap anywhere</div>

<div id="fullscreen-btn">⛶</div>

<img id="logo" src="/simp.png" />

<div id="manifesto-overlay">
  <div id="manifesto-text"></div>
</div>

</div>

<script>
const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWb6tylWpk9MZSp4sppFMgMPsVJBp3xyV5aJxLciYDcS2U5XiljbZlAg8muJzc3f6J4-bVfqYJf-a4/pub?output=csv";

let videos = [];
let currentIndex = 0;
let watchStart = 0;
let userStarted = false;
let lastSkip = 0;
let lastShake = 0;

/* DOM */
const player = document.getElementById("player");
const tap = document.getElementById("tap-layer");
const logo = document.getElementById("logo");
const manifesto = document.getElementById("manifesto-overlay");
const textEl = document.getElementById("manifesto-text");
const fullscreenBtn = document.getElementById("fullscreen-btn");
const app = document.getElementById("app");
const startOverlay = document.getElementById("start-overlay");
const startBtn = document.getElementById("start-btn");

/* PROFILE */
const profile = { category:{}, mood:{}, energy:{} };
const recent = [];

/* HELPERS */
function id(url){
  try{
    const u = new URL(url);
    return u.searchParams.get("v") || u.pathname.split("/").pop();
  }catch{return null}
}

function embed(id){
  return `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&controls=0`;
}

function bump(obj,key,val){
  if(!key)return;
  obj[key]=(obj[key]||0)+val;
}

/* LOAD */
async function load(){
  const txt = await fetch(SHEET).then(r=>r.text());
  const rows = txt.split("\n").slice(1);

  videos = rows.map(r=>{
    const [url,category,mood,energy] = r.split(",");
    return { id:id(url), category, mood, energy };
  }).filter(v=>v.id);

  document.getElementById("loader").style.display="none";
}

/* ALGO */
function feedback(video, t){
  if(t<5){
    bump(profile.category,video.category,-3);
    bump(profile.mood,video.mood,-3);
  }else{
    bump(profile.category,video.category,2);
    bump(profile.mood,video.mood,2);
  }
}

function score(v){
  let s=0;
  s+=(profile.category[v.category]||0)*3;
  s+=(profile.mood[v.mood]||0)*3;
  if(recent.includes(v.id)) s-=50;
  return s + Math.random()*2;
}

function pick(){
  return videos
    .map((v,i)=>({i,s:score(v)}))
    .sort((a,b)=>b.s-a.s)[0].i;
}

/* PLAYER */
function play(i){
  currentIndex=i;
  player.src = embed(videos[i].id);
  watchStart = Date.now();
  recent.push(videos[i].id);
}

function next(){
  const now = Date.now();
  if(now - lastSkip < 800) return;
  lastSkip = now;

  const t = (Date.now()-watchStart)/1000;
  feedback(videos[currentIndex], t);

  setTimeout(()=>{
    play(pick());
  },700);
}

/* START */
startBtn.onclick = ()=>{
  userStarted = true;
  startOverlay.classList.add("hidden");
  play(Math.floor(Math.random()*videos.length));
};

/* TAP */
tap.onclick = ()=>{
  if(!userStarted) return;
  next();
};

/* SHAKE */
window.addEventListener("devicemotion",(e)=>{
  const acc = e.accelerationIncludingGravity;
  if(!acc) return;

  const total = Math.abs(acc.x)+Math.abs(acc.y)+Math.abs(acc.z);
  const now = Date.now();

  if(total>40 && now-lastShake>1200){
    lastShake = now;
    next();
  }
});

/* FULLSCREEN */
fullscreenBtn.onclick = ()=>{
  if(!document.fullscreenElement){
    app.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
};

document.addEventListener("keydown",(e)=>{
  if(e.key==="f") app.requestFullscreen();
});

/* MANIFESTO */
logo.onclick = (e)=>{
  e.stopPropagation();
  manifesto.classList.toggle("visible");

  const text = `No account.
No password.
No ads.
No cookies.
No tracking.
No data collection.
Just music, video, and privacy.`;

  textEl.innerHTML="";
  let i=0;
  function t(){
    textEl.innerHTML=text.slice(0,i++);
    if(i<text.length) setTimeout(t,20);
  }
  t();
};

/* INIT */
load();
</script>
</body>
</html>
